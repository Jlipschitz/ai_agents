name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Check and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run checks
        run: npm run check

      - name: Validate config
        run: npm run validate:agents-config

      - name: Run tests
        run: npm test
