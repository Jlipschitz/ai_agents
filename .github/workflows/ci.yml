name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Check and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

      - name: Run lint
        run: npm run lint

      - name: Check JSDoc
        run: npm run jsdoc:check

      - name: Check formatting
        run: npm run format:check

      - name: Validate config
        run: npm run validate:agents-config

      - name: Run tests
        run: npm test
